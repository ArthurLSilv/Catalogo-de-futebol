<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastrar Jogador</title>
  <link rel="icon" type="image/png" href="logofut.png" />
  <link rel="stylesheet" href="index.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo"><img src="logofut.png" alt="Logo" class="logo-img" /><span>FutCatálogo</span></div>
      <nav>
        <a href="index.html">Início</a>
      </nav>
    </div>
  </header>

  <main class="form-wrapper">
    <div class="form-card">
      <h2>Cadastrar <span>Jogador</span></h2>
      <p class="sub">Preencha os dados do novo jogador</p>

      <div id="debug">
      </div>

      <div id="alerta" class="alerta hidden"></div>

      <div class="form-grid">
        <div class="campo">
          <label>Nome *</label>
          <input type="text" id="nome" placeholder="Ex: Lionel Messi"/>
        </div>
        <div class="campo">
          <label>Posição *</label>
          <select id="posicao">
            <option value="">Selecione</option>
            <option>Goleiro</option>
            <option>Zagueiro</option>
            <option>Lateral</option>
            <option>Volante</option>
            <option>Meia</option>
            <option>Atacante</option>
          </select>
        </div>
        <div class="campo">
          <label>Clube *</label>
          <input type="text" id="clube" placeholder="Ex: Inter Miami"/>
        </div>
        <div class="campo">
          <label>País</label>
          <input type="text" id="pais" placeholder="Ex: Argentina"/>
        </div>
        <div class="campo">
          <label>Idade</label>
          <input type="number" id="idade" placeholder="Ex: 36" min="1" max="99"/>
        </div>
        <div class="campo">
          <label>Número da Camisa</label>
          <input type="number" id="numero" placeholder="Ex: 10" min="1" max="99"/>
        </div>
        <div class="campo full">
          <label>URL da Foto</label>
          <input type="url" id="foto" placeholder="https://exemplo.com/foto.jpg"/>
        </div>
      </div>

      <div class="form-acoes">
        <a href="index.html" class="btn-voltar">← Voltar</a>
        <button id="btnCadastrar" onclick="cadastrar()">Cadastrar</button>
      </div>
    </div>
  </main>

  <script>
    const API = "/alexandre/catalogo_futebol/Back/";

    function debug(msg) {
      const el = document.getElementById("debug");
      el.innerHTML += "<br>→ " + msg;
    }

    
    window.addEventListener("DOMContentLoaded", async () => {
      
      try {
        const res = await fetch(API + "listar.php");
        ;
        const texto = await res.text();
       ;
      } catch (e) {
        ;
      }
    });

    async function cadastrar() {
      
      const btn = document.getElementById("btnCadastrar");

      const campos = {
        nome:    document.getElementById("nome").value.trim(),
        posicao: document.getElementById("posicao").value,
        clube:   document.getElementById("clube").value.trim(),
        pais:    document.getElementById("pais").value.trim(),
        idade:   document.getElementById("idade").value,
        numero:  document.getElementById("numero").value,
        foto:    document.getElementById("foto").value.trim(),
      };


      if (!campos.nome || !campos.posicao || !campos.clube) {
        mostrarAlerta("Preencha os campos obrigatórios: Nome, Posição e Clube.", "erro");
     
        return;
      }

      btn.disabled    = true;
      btn.textContent = " Cadastrando...";

      try {
        const form = new FormData();
        Object.entries(campos).forEach(([k, v]) => form.append(k, v));

        const res = await fetch(`${API}cadastro.php`, { method: "POST", body: form });
    

        const texto = await res.text();
        

        const data = JSON.parse(texto);

        if (data.sucesso) {
          mostrarAlerta(data.sucesso, "ok");
          document.querySelectorAll(".form-grid input, .form-grid select")
                  .forEach(el => el.value = "");
        } else {
          mostrarAlerta((data.erro || "Erro desconhecido."), "erro");
          debug("Erro do servidor: " + data.erro);
        }

      } catch (e) {
        debug("EXCEÇÃO: " + e.message);
        mostrarAlerta("Erro ao conectar com o servidor.", "erro");
      } finally {
        btn.disabled    = false;
        btn.textContent = "Cadastrar";
      }
    }

    function mostrarAlerta(msg, tipo) {
      const el = document.getElementById("alerta");
      el.textContent = msg;
      el.className   = "alerta " + tipo;
      el.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  </script>
</body>
</html>
